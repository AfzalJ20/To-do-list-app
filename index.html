<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>To-Do List App</title>

    <link rel="stylesheet" href="index.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

<h1>📝 My To-Do List</h1>

<div class="input-box">

<input
type="text"
id="taskInput"
placeholder="Enter a task...">

<button id="addBtn">

<i class="fa-solid fa-plus"></i>

Add

</button>

</div>

<div class="stats">

<p>Total :
<span id="total">0</span></p>

<p>Completed :
<span id="completed">0</span></p>

<p>Remaining :
<span id="remaining">0</span></p>

</div>

<ul id="taskList"></ul>

</div>

<script src="index.js"></script>

</body>

</html>
